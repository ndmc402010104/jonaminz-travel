<!DOCTYPE html>
<!--
Jonaminz Travel — 獨立外部專案（Platform Integration，跟 jonaminz-movies
同一個模式：不需要建置工具的純 HTML/CSS/JS，自己的 repo/GitHub Pages
部署，透過 jonaminz.contract.json 向 jonaminz 平台註冊，等待 Contract
核准）。

前端邏輯移植自 jonaminz 主 repo 曾經做過的 pages/travel/（第一條垂直
流程：建立Trip→建立Place→建立Day→Assign Place→Move Stop→Unassign→
Reload），拿掉 reservoir/entry-core/requireLogin 的相依——這裡是獨立
站台，沒有共用 jonaminz.com 的 session，資料存在這個網域自己的
localStorage（跟 jonaminz-movies 目前也只有 demo 資料的階段一致）。

2026-07-14：畫面改版，照交接包 REFERENCE/v0.5.1-visual-prototype-
standalone.html 的「Journey Builder」畫面設計語言重做（見 styles.css
檔頭說明）。hero／toolbar／三欄式版面都由 app.js 依目前選中的 Trip
動態渲染，這裡只留品牌列跟 app-root 容器。
-->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Jonaminz Travel</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="">
  <link rel="stylesheet" href="styles.css?v=20260723-product4">

  <!-- Jonaminz Platform SDK：S21 官方 snippet（原文凍結，逐字照抄，見
       jonaminz repo docs/platform-integration-spec-v1.md）。2026-07-14 接入：
       這是第一個真的載入 SDK 的外部專案。SDK 載入後會自動推送本 repo 根目錄
       的 jonaminz.contract.json、查 Effective Settings，被授權 chat.launcher@1
       時自動在右下角掛浮動 Chat 入口（iframe，本體在 jonaminz.com 那邊）。
       SDK 任何失敗都只會 degraded，不影響本頁自己的功能（S24）。
       data-contract 帶 GitHub Pages 子路徑（/jonaminz-travel/...）——預設值
       /jonaminz.contract.json 是網域根目錄，在 project pages 上會 404。 -->
  <script>
  (function () {
    if (window.Jonaminz) return;               /* 冪等：只建一次 */
    var jz = { status: "loading", reason: null };
    var b = { settled: false };
    jz.ready = new Promise(function (resolve, reject) {
      b.resolve = resolve;
      b.reject = reject;
    });
    b.settle = function (kind, reason) {
      if (b.settled) return;                   /* 只 settle 一次 */
      b.settled = true;
      clearTimeout(b.timer);
      if (kind === "reject") {
        jz.status = "failed";
        jz.reason = reason && reason.code ? reason.code : String(reason);
        b.reject(reason);
      } else {
        jz.status = kind;                      /* "ready" 或 "degraded" */
        jz.reason = reason || null;
        b.resolve(jz);
      }
      delete jz.__bootstrap;                   /* settle 後清除內部 reference */
    };
    b.timer = setTimeout(function () {
      b.settle("degraded", "SDK_LOAD_TIMEOUT");
    }, 15000);
    jz.__snippetVersion = 1;                   /* 永久身分標記，settle 後保留 */
    jz.__bootstrap = b;
    window.Jonaminz = jz;
  })();
  </script>
  <script async src="https://jonaminz.com/sdk/jonaminz-entry.js"
          data-contract="/jonaminz-travel/jonaminz.contract.json"
          onerror="window.Jonaminz&&window.Jonaminz.__bootstrap&&window.Jonaminz.__bootstrap.settle('degraded','SDK_LOAD_FAILED')"></script>
</head>
<body>
  <header class="travel-header">
    <span class="travel-brand">Jonaminz Travel<i></i></span>
  </header>

  <main class="travel-main">
    <div id="app-root">
      <p class="travel-loading">初始化中...</p>
    </div>
  </main>

  <footer class="travel-footer">
    <a href="https://github.com/ndmc402010104/jonaminz">Jonaminz Platform Integration</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="map-adapter.js?v=20260723-product4"></script>
  <script src="templates.js?v=20260723-product4"></script>
  <script src="pdf-import.js?v=20260723-product4"></script>
  <script src="app.js?v=20260723-product4"></script>
</body>
</html>

<!DOCTYPE html>
<!--
Jonaminz Travel — 獨立外部專案（Platform Integration，跟 jonaminz-movies
同一個模式：不需要建置工具的純 HTML/CSS/JS，自己的 repo/GitHub Pages
部署，透過 jonaminz.contract.json 向 jonaminz 平台註冊，等待 Contract
核准）。

前端邏輯移植自 jonaminz 主 repo 曾經做過的 pages/travel/（第一條垂直
流程：建立Trip→建立Place→建立Day→Assign Place→Move Stop→Unassign→
Reload），拿掉 reservoir/entry-core/requireLogin 的相依——這裡是獨立
站台，沒有共用 jonaminz.com 的 session，資料存在這個網域自己的
localStorage（跟 jonaminz-movies 目前也只有 demo 資料的階段一致）。
-->
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Jonaminz Travel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="travel-header">
    <span class="travel-brand">Jonaminz Travel</span>
  </header>

  <main class="travel-main">
    <section class="travel-hero">
      <p class="travel-eyebrow">Jonaminz Travel</p>
      <h1 class="travel-title">旅行規劃</h1>
      <p class="travel-subtitle">
        建立旅行 → 收集景點 → 排進每天 → 調整順序。獨立站台 demo，資料
        存在這個瀏覽器（尚未接 jonaminz 平台身分／後端）。
      </p>
    </section>

    <div id="app-root">
      <p class="travel-loading">初始化中...</p>
    </div>
  </main>

  <footer class="travel-footer">
    <a href="https://github.com/ndmc402010104/jonaminz">Jonaminz Platform Integration</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
